<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<form>
    <h1>Твой мир реален или это симуляция?</h1>
    <div class="question">
        <label>Сколько лун ты видишь?</label>
        <input type="radio" name="question1" class="answer">1
        <input type="radio" name="question1">8
        <input type="radio" name="question1">11
        <input type="radio" name="question1" >9
    </div>


    <div class="question">
        <label>Какого цвета трава?   </label>
        <input type="radio" name="question2">Синяя
        <input type="radio" name="question2" class="answer">Зеленая
        <input type="radio" name="question2">Белая
        <input type="radio" name="question2">Красная
    </div>


    <div class="question">
        <label>Люди это животные?</label>
        <input type="radio" name="question3">Нет
        <input type="radio" name="question3" class="answer">Да
    </div>


    <div class="question">
        <label>Какое животное не любит мясо?       </label>
        <input type="radio" name="question4">Гиена
        <input type="radio" name="question4">Волк
        <input type="radio" name="question4" class="answer">Корова
        <input type="radio" name="question4">Тигр
    </div>


    <div class="question">
        <label>Луговой цветок это?</label>
        <input type="radio" name="question5" class="answer">Нивяник 
        <input type="radio" name="question5">Роза  
        <input type="radio" name="question5" >Кактус
        <input type="radio" name="question5">Водоросли
    </div>

    <button type="submit" class="btn">Отправить ответы</button>

    <p id="show"></p>
   
</form>

<script src="index.js"></script>
</body>
</html>
